services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    env_file:
      - .env

    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine

    restart: unless-stopped

    environment:
      POSTGRES_DB: DB_name
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: DB_pd

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
